name: CI — Lint, Typecheck, Build, Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WO_o0BQBhMLL6sQ_z3ERdQGn6moUib9RoJhs
  VETIOS_DEV_BYPASS: 'true'

jobs:
  # ── Gate: must pass before merge ──────────────────────
  gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint --filter=@vetios/web

      - name: Typecheck
        run: pnpm run typecheck --filter=@vetios/web

      - name: Build
        run: pnpm run build --filter=@vetios/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── Smoke Tests: API endpoint validation ──────────────
  smoke:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build --filter=@vetios/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Start production server
        run: |
          cd apps/web
          VETIOS_DEV_BYPASS=true npx next start -p 3000 &
          sleep 5
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Smoke test — empty body returns 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/inference -H "Content-Type: application/json" -H "Authorization: Bearer test-bypass")
          if [ "$STATUS" != "400" ]; then echo "Expected 400, got $STATUS"; exit 1; fi
          echo "✓ /api/inference empty body → 400"

      - name: Smoke test — invalid schema returns 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/inference -H "Content-Type: application/json" -H "Authorization: Bearer test-bypass" -d '{"bad":"data"}')
          if [ "$STATUS" != "400" ]; then echo "Expected 400, got $STATUS"; exit 1; fi
          echo "✓ /api/inference bad schema → 400"

      - name: Smoke test — request ID in response
        run: |
          HEADERS=$(curl -s -D - -o /dev/null -X POST http://localhost:3000/api/inference -H "Content-Type: application/json" -H "Authorization: Bearer test-bypass" -d '{}')
          if echo "$HEADERS" | grep -qi "x-request-id"; then
            echo "✓ x-request-id present in response"
          else
            echo "✗ x-request-id missing"; exit 1
          fi

      - name: Smoke test — /api/ml/predict GET returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ml/predict)
          if [ "$STATUS" != "200" ]; then echo "Expected 200, got $STATUS"; exit 1; fi
          echo "✓ /api/ml/predict GET → 200"

      - name: Smoke test — /api/outcome missing fields returns 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/outcome -H "Content-Type: application/json" -H "Authorization: Bearer test-bypass" -d '{"bad":"data"}')
          if [ "$STATUS" != "400" ]; then echo "Expected 400, got $STATUS"; exit 1; fi
          echo "✓ /api/outcome bad schema → 400"

      - name: Smoke test — /api/simulate missing fields returns 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/simulate -H "Content-Type: application/json" -H "Authorization: Bearer test-bypass" -d '{"bad":"data"}')
          if [ "$STATUS" != "400" ]; then echo "Expected 400, got $STATUS"; exit 1; fi
          echo "✓ /api/simulate bad schema → 400"