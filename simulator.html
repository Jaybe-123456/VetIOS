<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETIOS SOVEREIGN TOROIDAL HELIX</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.1);
            min-width: 250px;
            pointer-events: auto;
            z-index: 10;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            color: #00ff41;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
            accent-color: #00ff41;
            background: transparent;
        }
        #info-title {
            font-size: 20px;
            font-weight: bold;
            color: #00ff41;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        #info-desc {
            font-size: 12px;
            color: #aaa;
            max-width: 400px;
            line-height: 1.4;
        }
        .annotation {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 65, 0.5);
            color: #00ff41;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 2px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            text-transform: uppercase;
            transition: opacity 0.2s;
            opacity: 0.8;
        }
        .annotation::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -1px;
            width: 2px;
            height: 15px;
            background: rgba(0, 255, 65, 0.5);
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="info-title"></div>
        <div id="info-desc"></div>
    </div>
    <div id="controls"></div>
    <div id="annotations-layer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. SETUP THREE.JS SCENE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 250, 450);
        camera.lookAt(0, 50, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 2. PARTICLE SYSTEM CONFIG ---
        const count = 45000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const sizes = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            sizes[i] = Math.random() * 2 + 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // Use a glowing particle material
        const material = new THREE.PointsMaterial({
            size: 1.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        // Add soft circular mask for particles
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const texture = new THREE.CanvasTexture(canvas);
        material.map = texture;

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 3. RUNTIME API (addControl, setInfo, annotate) ---
        const controlsMap = new Map();
        const annotationsMap = new Map();
        
        function addControl(id, label, min, max, initial) {
            if (!controlsMap.has(id)) {
                const container = document.getElementById('controls');
                
                const group = document.createElement('div');
                group.className = 'control-group';
                
                const labelDiv = document.createElement('div');
                labelDiv.className = 'control-label';
                
                const titleSpan = document.createElement('span');
                titleSpan.innerText = label;
                const valSpan = document.createElement('span');
                valSpan.id = 'val-' + id;
                valSpan.innerText = initial.toFixed(2);
                
                labelDiv.appendChild(titleSpan);
                labelDiv.appendChild(valSpan);
                
                const input = document.createElement('input');
                input.type = 'range';
                input.min = min;
                input.max = max;
                input.step = (max - min) / 100;
                input.value = initial;
                
                input.oninput = (e) => {
                    const val = parseFloat(e.target.value);
                    controlsMap.set(id, val);
                    document.getElementById('val-' + id).innerText = val.toFixed(2);
                };
                
                group.appendChild(labelDiv);
                group.appendChild(input);
                container.appendChild(group);
                
                controlsMap.set(id, initial);
            }
            return controlsMap.get(id);
        }

        let infoSet = false;
        function setInfo(title, desc) {
            if (infoSet) return;
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-desc').innerText = desc;
            infoSet = true;
        }

        function annotate(id, vector3, label) {
            if (!annotationsMap.has(id)) {
                annotationsMap.set(id, { pos: vector3, label: label });
            } else {
                annotationsMap.get(id).pos.copy(vector3);
            }
        }

        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
        });

        // --- 4. MAIN ANIMATION LOOP ---
        const clock = new THREE.Clock();
        const target = new THREE.Vector3();
        const color = new THREE.Color();

        function render() {
            requestAnimationFrame(render);
            
            const time = clock.getElapsedTime();
            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;

            // Execute the USER's code for each particle
            for (let i = 0; i < count; i++) {
                
                // ==========================================
                // VETIOS SOVEREIGN TOROIDAL HELIX SCRIPT (Injected dynamically per particle)
                // ==========================================
                const scale = addControl("scale", "Infrastructure Scale", 30, 260, 120);
                const lift = addControl("lift", "Clinical Lift", 0, 120, 28);
                const spin = addControl("spin", "Network Spin", 0, 4, 1.15);
                const pulse = addControl("pulse", "Signal Pulse", 0, 4, 1.4);
                const grid = addControl("grid", "Mesh Density", 0, 3, 1.2);
                const sovereign = addControl("sovereign", "Sovereignty", 0, 3, 1.6);
                const chaos = addControl("chaos", "Adversarial Chaos", 0, 2, 0.4);
                const glow = addControl("glow", "Bioluminescence", 0, 2, 1.0);

                const u = i / count;
                const tau = 6.28318530718;
                const t = time * spin;

                const lane = u * 18.0;
                const layer = u * 7.0;
                const a0 = tau * lane;
                const a1 = tau * layer + t * 0.6;

                const s0 = Math.sin(a0 + t);
                const c0 = Math.cos(a0 - t * 0.8);
                const s1 = Math.sin(a1 - t * 0.5);
                const c1 = Math.cos(a1 + t * 0.7);
                const s2 = Math.sin(a0 * 0.5 + a1 * 0.75 - t * 1.1);
                const c2 = Math.cos(a0 * 0.75 - a1 * 0.45 + t * 0.9);

                const breath = 1.0 + 0.12 * Math.sin(time * 0.3);
                const coreBand = 0.32 + 0.68 * Math.abs(Math.sin(u * tau * 3.0));
                const clinicalWave = Math.sin(a0 * 2.0 - t * pulse) * Math.cos(a1 * 1.5 + t * 0.4);
                const dataWave = Math.sin(a0 * 3.0 + a1 * 2.0 - t * 0.7);
                const simWave = Math.cos(a0 * 1.25 - a1 * 2.5 + t * 1.2);
                const chaosWave = chaos * Math.sin(a0 * 5.0 - t * 2.3) * Math.cos(a1 * 4.0 + t * 1.7);

                const mesh = 1.0 + 0.14 * grid * clinicalWave + 0.09 * dataWave + 0.06 * chaosWave;
                const moat = 1.0 + 0.18 * sovereign * simWave;
                const radius = scale * breath * (0.18 + 0.82 * coreBand) * mesh * moat;

                const helix = a0 + 0.55 * s1 + sovereign * 0.22 * c2;
                const shell = -1.0 + 2.0 * u;
                const arch = 1.0 - shell * shell;
                const yBase = lift * shell + scale * 0.22 * s2 * arch;
                const ring = radius * (0.55 + 0.45 * arch);

                const x = ring * Math.cos(helix) + scale * 0.12 * sovereign * c1 + scale * 0.05 * grid * dataWave;
                const y = yBase + scale * 0.16 * clinicalWave * arch;
                const z = ring * Math.sin(helix) + scale * 0.12 * sovereign * s0 + scale * 0.05 * grid * simWave;

                target.set(x, y, z);

                const hueBase = 0.52 + 0.12 * Math.sin(time * 0.15);
                const hueShift = 0.15 * clinicalWave + 0.1 * dataWave + 0.08 * simWave + 0.05 * chaosWave;
                const hueRaw = hueBase + hueShift;
                const hue = hueRaw - Math.floor(hueRaw);
                const sat = 0.78 + 0.22 * Math.abs(simWave);
                const satClamped = sat > 1.0 ? 1.0 : sat;
                const brightness = glow * (0.38 + 0.22 * arch + 0.15 * Math.abs(clinicalWave) + 0.1 * sovereign * Math.abs(dataWave));
                const brightClamped = brightness > 1.0 ? 1.0 : brightness;

                color.setHSL(hue, satClamped, brightClamped);

                if (i === 0) {
                  setInfo("VetIOS Sovereign Infrastructure Lattice", "Clinical diagnostics pulse at the core, adversarial rings test boundaries, data channels carry intelligence along the spine, and the sovereign perimeter breathes as a defensible compute field.");
                  annotate("core", new THREE.Vector3(0, 0, 0), "Diagnostic Core");
                  annotate("sim", new THREE.Vector3(scale * 1.15, 0, 0), "Simulation Ring");
                  annotate("spine", new THREE.Vector3(0, lift + scale * 0.9, 0), "Data Spine");
                  annotate("perimeter", new THREE.Vector3(0, 0, scale * 1.2), "Sovereign Perimeter");
                  annotate("feedback", new THREE.Vector3(scale * 0.6, scale * 0.6, scale * 0.6), "Feedback Loop Alpha");
                }
                // ==========================================

                posAttr.setXYZ(i, target.x, target.y, target.z);
                colAttr.setXYZ(i, color.r, color.g, color.b);
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            
            // Slow rotation for visual effect
            particles.rotation.y += 0.002;
            particles.rotation.x += mouseY * 0.05;
            particles.rotation.z += mouseX * 0.05;

            // Update annotations
            const annLayer = document.getElementById('annotations-layer');
            annLayer.innerHTML = '';
            
            const tempV = new THREE.Vector3();
            annotationsMap.forEach((ann, id) => {
                tempV.copy(ann.pos);
                // Apply the particle rotation to annotations manually to keep them synced
                tempV.applyEuler(particles.rotation);
                tempV.project(camera);
                
                // Check if behind camera
                if (tempV.z > 1) return;
                
                const sx = (tempV.x * .5 + .5) * window.innerWidth;
                const sy = (tempV.y * -.5 + .5) * window.innerHeight;
                
                const el = document.createElement('div');
                el.className = 'annotation';
                el.innerText = ann.label;
                el.style.left = sx + 'px';
                el.style.top = sy + 'px';
                
                // Fade out if it's "behind" the center logic
                if (tempV.z > 0.98) {
                    el.style.opacity = '0.2';
                }
                
                annLayer.appendChild(el);
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        render();
    </script>
</body>
</html>
